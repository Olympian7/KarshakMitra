<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KarshakMitra - Advanced Assistant</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use PT Sans font for a clean, professional look -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap">
    <style>
        body {
            font-family: 'PT Sans', sans-serif;
            background-color: #f0f4f8; /* Light blue-gray background */
        }
        .chat-container {
            height: 100vh;
        }
        .chat-box {
            height: calc(100% - 6rem);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .chat-box::-webkit-scrollbar {
            display: none;
        }
        .message {
            max-width: 80%;
        }
        .user-message {
            align-self: flex-end;
        }
        .ai-message {
            align-self: flex-start;
        }
        .heading-font {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center p-0">

    <div class="w-full h-screen flex flex-col border border-gray-300 rounded-lg shadow-2xl bg-white">
        <!-- Header -->
        <div class="p-4 bg-white text-gray-800 shadow-md flex items-center justify-center space-x-3 border-b border-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600">
                <path d="M12 4c-2.3 0-4.4.9-6 2.5-1.6 1.6-2.5 3.7-2.5 6 0 2.3.9 4.4 2.5 6 1.6 1.6 3.7 2.5 6 2.5s4.4-.9 6-2.5c1.6-1.6 2.5-3.7 2.5-6 0-2.3-.9-4.4-2.5-6C16.4 4.9 14.3 4 12 4z"></path>
                <path d="M12 12c-2.3 0-4.4-.9-6-2.5"></path>
                <path d="M12 12c2.3 0-4.4-.9 6-2.5"></path>
                <path d="M12 12v10"></path>
                <path d="M12 12c-2.3 0-4.4.9-6 2.5"></path>
                <path d="m12 12 6 2.5"></path>
                <path d="m6 9.5 6 2.5"></path>
            </svg>
            <h1 class="text-2xl font-bold heading-font text-gray-700">KarshakMitra AI</h1>
        </div>

        <!-- Chat Box to display messages -->
        <div id="chat-box" class="flex-1 p-4 flex flex-col space-y-4 chat-box bg-gray-50">
            <!-- Initial AI message to greet the user -->
        </div>

        <!-- Typing Indicator and Input Field -->
        <div class="p-4 bg-white border-t border-gray-200">
            <div id="typing-indicator" class="hidden text-gray-500 mb-2 text-sm italic">
                KarshakMitra is typing...
            </div>
            <div class="flex items-center space-x-2">
                <input id="user-input" type="text" placeholder="Ask about farming in Kerala..." class="flex-1 p-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-200">
                
                <!-- Send button for text input -->
                <button id="send-button" class="bg-green-600 text-white p-3 rounded-full shadow-lg hover:bg-green-700 transition-colors duration-200 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');

        const apiKey = "AIzaSyDR7m1uyThriJQcPtasASsCgnHQ1BGi-WY";
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

        let chatHistory = [];

        const initialMessage = 'Hello! I am KarshakMitra, an AI assistant. You can ask me anything about farming in Kerala.';

        const addMessage = (text, isUser) => {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'p-3', 'rounded-xl', 'shadow-sm');
            messageElement.style.whiteSpace = 'pre-wrap';
            
            const messageContent = document.createElement('p');
            messageContent.textContent = text;
            messageElement.appendChild(messageContent);

            if (isUser) {
                messageElement.classList.add('bg-green-200', 'text-green-900', 'user-message');
            } else {
                messageElement.classList.add('bg-gray-200', 'text-gray-800', 'ai-message');
            }
            
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Add the message to history *after* it's been displayed
            chatHistory.push({
                role: isUser ? "user" : "model",
                parts: [{ text: text }]
            });
        };
        
        const sendMessage = async () => {
            const userMessage = userInput.value.trim();
            if (userMessage === '') return;

            addMessage(userMessage, true);
            userInput.value = '';
            typingIndicator.classList.remove('hidden');

            const systemInstruction = {
                parts: [{
                    text: `You are an AI assistant named KarshakMitra. Your primary function is to provide expert advice on farming, specifically for crops common in Kerala, India. If a user asks about a specific crop (e.g., 'tomato', 'coconut', 'rice'), provide detailed information on optimal farming conditions including soil type, climate, seed types, pests, diseases, and harvesting. If the user's query is not related to farming, respond in a friendly, conversational tone and redirect them to farming-related topics. Respond in the same language as the user. If the user's language is ambiguous, respond in English.`
                }]
            };

            const payload = {
                contents: chatHistory,
                systemInstruction: systemInstruction
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                addMessage(aiResponse, false);

            } catch (error) {
                console.error('Error fetching from API:', error);
                // Use a more descriptive error message
                addMessage(`Sorry, an error occurred: ${error.message}. Please check the API key and network connection.`, false);
            } finally {
                typingIndicator.classList.add('hidden');
            }
        };

        // Event listeners for sending a message
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize the chat with the first message
        window.addEventListener('DOMContentLoaded', () => {
            // Only add the initial message visually, but also prime the chat history
             const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'p-3', 'rounded-xl', 'shadow-sm', 'bg-gray-200', 'text-gray-800', 'ai-message');
            messageElement.style.whiteSpace = 'pre-wrap';
            const messageContent = document.createElement('p');
            messageContent.textContent = initialMessage;
            messageElement.appendChild(messageContent);
            chatBox.appendChild(messageElement);

            chatHistory.push({
                role: "model",
                parts: [{text: initialMessage}]
            });
        });
    </script>
</body>
</html>
